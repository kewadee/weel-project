<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>อีซูซุลพบุรีช่วยไทยพลัส</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fahkwang:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
--navy:#303f9f;
--navy-deep:#1a237e;
--gold:#E7B93B;
--gold-soft:#F6D97A;
--red:#E60012;
--cream:#FFFFFF;
--teal:#039be5;
--bulb-glow: 0 0 8px rgba(231,185,59,0.9), 0 0 16px rgba(231,185,59,0.5);
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0; padding:0; height:100%;}
body{
font-family:'Fahkwang', sans-serif;
background:#FFFFFF;
color:#1a1a2e;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow-x:hidden;
padding:24px 16px 40px;
}
.stage{
width:100%;
max-width:440px;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
}
.lights{
display:flex;
justify-content:space-between;
width:100%;
max-width:320px;
margin-bottom:6px;
}
.lights span{
width:8px; height:8px; border-radius:50%;
background:var(--gold-soft);
box-shadow:var(--bulb-glow);
animation: twinkle 1.6s infinite ease-in-out;
}
.lights span:nth-child(odd){animation-delay:.4s;}
.lights span:nth-child(3n){animation-delay:.8s;}
@keyframes twinkle{
0%,100%{opacity:1; transform:scale(1);}
50%{opacity:.35; transform:scale(0.8);}
}
.eyebrow{
font-family:'Fahkwang', sans-serif;
font-size:12px;
letter-spacing:.24em;
color:var(--gold-soft);
font-weight:600;
margin:10px 0 2px;
text-transform:uppercase;
}
h1{
font-family:'Fahkwang', sans-serif;
font-weight:800;
font-size:clamp(20px, 5.4vw, 26px);
margin:0 0 6px;
color:var(--navy-deep);
letter-spacing:.01em;
}
.sub{
font-size:14.5px;
color:#C7CCE0;
margin-bottom:22px;
line-height:1.5;
}

.wheel-wrap{
position:relative;
width:min(78vw, 320px);
aspect-ratio:1/1;
margin: 24px 0 26px;
}
.pointer{
position:absolute;
top:-14px; left:50%;
transform:translateX(-50%);
width:0; height:0;
border-left:14px solid transparent;
border-right:14px solid transparent;
border-top:26px solid var(--red);
filter: drop-shadow(0 2px 3px rgba(0,0,0,.4));
z-index:5;
}
.pointer::after{
content:'';
position:absolute;
top:-30px; left:-8px;
width:16px; height:16px;
border-radius:50%;
background:var(--red);
box-shadow: 0 0 8px rgba(230,0,18,0.9), 0 0 16px rgba(230,0,18,0.5);
}
.rim{
position:absolute;
inset:-10px;
border-radius:50%;
background: conic-gradient(from 0deg, var(--gold), var(--gold-soft), var(--gold));
box-shadow: 0 8px 30px rgba(0,0,0,.5), inset 0 0 0 2px rgba(255,255,255,.15);
}
.rim .bulb{
position:absolute;
width:9px;
height:9px;
top:50%; left:50%;
margin:-4.5px;
border-radius:50%;
background:var(--cream);
box-shadow:var(--bulb-glow);
animation: twinkle 1.8s infinite ease-in-out;
}
.wheel{
position:absolute;
inset:10px;
border-radius:50%;
overflow:hidden;
box-shadow: inset 0 0 0 3px rgba(0,0,0,.25), 0 0 0 2px rgba(255,255,255,.06);
transition: transform 4.2s cubic-bezier(.13,.85,.09,1);
background: var(--navy-deep);
}
.wheel .sector{
position:absolute;
top:0; left:0;
width:50%; height:50%;
transform-origin:100% 100%;
display:flex;
align-items:center;
justify-content:center;
}
.sector-fill{
position:absolute;
inset:0;
}
.sector-label{
position:absolute;
width:40px;
height:40px;
display:flex;
align-items:center;
justify-content:center;
font-family:'Fahkwang', sans-serif;
font-weight:700;
font-size:24px;
color:#FFFFFF;
line-height:1;
text-shadow:0 2px 4px rgba(0,0,0,.5);
}
.hub{
position:absolute;
top:50%; left:50%;
width:20%; height:20%;
transform:translate(-50%,-50%);
border-radius:50%;
background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 60%, #b8891f 100%);
box-shadow: 0 3px 10px rgba(0,0,0,.4), inset 0 0 0 2px rgba(255,255,255,.25);
z-index:4;
}

.spin-btn{
font-family:'Fahkwang', sans-serif;
font-weight:700;
font-size:17px;
letter-spacing:.03em;
color:var(--navy-deep);
background: linear-gradient(180deg, var(--gold-soft), var(--gold));
border:none;
padding:15px 46px;
border-radius:999px;
cursor:pointer;
box-shadow: 0 6px 18px rgba(231,185,59,.35), inset 0 1px 0 rgba(255,255,255,.6);
transition: transform .15s ease, box-shadow .15s ease, opacity .2s ease;
}
.spin-btn:active{ transform: translateY(2px) scale(.98); }
.spin-btn:disabled{
opacity:.45;
cursor:not-allowed;
box-shadow:none;
}

.status{
margin-top:14px;
font-size:13px;
color:#6b7280;
min-height:18px;
}

/* Result overlay */
.overlay{
position:fixed; inset:0;
background:rgba(10,14,31,.72);
backdrop-filter: blur(3px);
display:flex; align-items:center; justify-content:center;
opacity:0; pointer-events:none;
transition: opacity .35s ease;
z-index:50;
padding:20px;
}
.overlay.show{ opacity:1; pointer-events:auto; }
.card{
background: linear-gradient(180deg, #1a2140, var(--navy-deep));
border:1px solid rgba(231,185,59,.35);
border-radius:20px;
padding:36px 30px 30px;
max-width:340px;
width:100%;
text-align:center;
transform: translateY(14px) scale(.96);
transition: transform .35s ease;
box-shadow: 0 20px 60px rgba(0,0,0,.5);
}
.overlay.show .card{ transform:translateY(0) scale(1); }
.card .tag{
font-family:'Fahkwang', sans-serif;
font-size:12px;
letter-spacing:.2em;
color:var(--gold-soft);
font-weight:600;
text-transform:uppercase;
}
.card .prize{
font-family:'Fahkwang', sans-serif;
font-weight:800;
font-size:44px;
color:var(--red);
margin:10px 0 4px;
}
.card .prize span{ font-size:20px; color:var(--red); font-weight:600; margin-left:4px;}
.card p{
font-size:14px;
color:#C7CCE0;
line-height:1.6;
margin:10px 0 22px;
}
.card button{
font-family:'Fahkwang', sans-serif;
font-weight:600;
font-size:14px;
color:var(--navy-deep);
background:var(--gold-soft);
border:none;
padding:11px 28px;
border-radius:999px;
cursor:pointer;
}

.confetti-piece{
position:fixed;
top:-10px;
width:8px; height:14px;
z-index:60;
opacity:.95;
pointer-events:none;
animation: fall linear forwards;
}
@keyframes fall{
to{ transform: translateY(110vh) rotate(540deg); opacity:.2; }
}

.footnote{
margin-top:26px;
font-size:11.5px;
color:#6D74A0;
letter-spacing:.02em;
}
</style>
</head>
<body>

<div class="stage">
<div class="lights">
<span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>
<h1>วงล้อลุ้นโชคอีซูซุลพบุรี<br>ช่วยไทยพลัส</h1>

<div class="wheel-wrap">
<div class="pointer"></div>
<div class="rim" id="rim"></div>
<div class="wheel" id="wheel"></div>
<div class="hub"></div>
</div>

<button class="spin-btn" id="spinBtn">หมุนเลย!</button>
<div class="status" id="status">กำลังตรวจสอบสิทธิ์...</div>

</div>

<div class="overlay" id="overlay">
<div class="card">
<div class="tag" style="color:#FFFFFF;">ยินดีด้วย คุณได้รับส่วนลด!</div>
<div class="prize" id="prizeText">0<span>บาท</span></div>
<p id="prizeSub">คุณลูกค้าได้รับส่วนลดเรียบร้อย<br>แสดง<span style="white-space:nowrap;">หน้าจอ</span>นี้ให้พนักงานเพื่อรับสิทธิ์</p>
<button id="closeCard">ตกลง</button>
</div>
</div>

<script>
// 4 sectors, equal odds (25% each)
const sectors = [
{ value: 50, color: '#9575cd' },
{ value: 100, color: '#4dd0e1' },
{ value: 150, color: '#f06292' },
{ value: 200, color: '#ff8a65' },
];
const N = sectors.length;
const sliceDeg = 360 / N;

const wheelEl = document.getElementById('wheel');
const rimEl = document.getElementById('rim');
const spinBtn = document.getElementById('spinBtn');
const statusEl = document.getElementById('status');
const overlay = document.getElementById('overlay');
const prizeText = document.getElementById('prizeText');
const closeCard = document.getElementById('closeCard');

function buildWheel(){
sectors.forEach((s, i) => {
const angle = i * sliceDeg;
const sector = document.createElement('div');
sector.className = 'sector';
sector.style.transform = `rotate(${angle}deg)`;

// pie slice via clip-path on a full-size fill, rotated + skewed approach using conic gradient instead
sector.remove(); // we'll use conic-gradient background instead, simpler & crisper
});

// Build background using conic-gradient stops for crisp edges
let stops = [];
sectors.forEach((s, i) => {
const start = i * sliceDeg;
const end = start + sliceDeg;
stops.push(`${s.color} ${start}deg ${end}deg`);
});
wheelEl.style.background = `conic-gradient(${stops.join(',')})`;

// Add labels positioned at each slice's mid-angle
// Same trig placement used for the rim bulbs below, so every number
// lands at the exact same distance from center, evenly spread apart.
const labelRadius = 32; // percent distance from center
sectors.forEach((s, i) => {
const mid = i * sliceDeg + sliceDeg / 2;
const rad = mid * Math.PI/180;
const x = 50 + labelRadius*Math.sin(rad);
const y = 50 - labelRadius*Math.cos(rad);
const label = document.createElement('div');
label.className = 'sector-label';
label.style.left = x+'%';
label.style.top = y+'%';
label.style.transform = 'translate(-50%,-50%)';
label.textContent = s.value;
wheelEl.appendChild(label);
});

// Rim bulbs
const bulbCount = 16;
for(let i=0;i<bulbCount;i++){
const b = document.createElement('div');
b.className = 'bulb';
const a = (360/bulbCount)*i;
const rad = a * Math.PI/180;
const r = 49; // percent radius from center
const x = 50 + r*Math.sin(rad);
const y = 50 - r*Math.cos(rad);
b.style.left = x+'%';
b.style.top = y+'%';
b.style.animationDelay = (i*0.08)+'s';
rimEl.appendChild(b);
}
}
buildWheel();

let currentRotation = 0;
let spinning = false;
let alreadySpun = false;

// Use sessionStorage so a page refresh (same tab/session) cannot be used
// to spin again. Opening the link fresh (new tab, new browser session,
// e.g. by scanning the QR code again) starts a new session and allows
// spinning again.
const SPIN_KEY = 'isuzu_lopburi_wheel_spun';
const savedPrize = sessionStorage.getItem(SPIN_KEY);

if (savedPrize !== null) {
// Already spun in this session — restore the result instead of allowing a new spin.
alreadySpun = true;
spinBtn.disabled = true;
spinBtn.textContent = 'หมุนไปแล้ว';
statusEl.textContent = `คุณได้รับส่วนลด ${savedPrize} บาท`;
} else {
statusEl.textContent = 'พร้อมหมุน 1 ครั้ง';
}

function spawnConfetti(){
const colors = ['#E7B93B','#D6484A','#2FA189','#F6D97A'];
for(let i=0;i<36;i++){
const p = document.createElement('div');
p.className = 'confetti-piece';
p.style.left = Math.random()*100+'vw';
p.style.background = colors[Math.floor(Math.random()*colors.length)];
p.style.animationDuration = (2.2+Math.random()*1.4)+'s';
p.style.transform = `rotate(${Math.random()*360}deg)`;
document.body.appendChild(p);
setTimeout(()=>p.remove(), 4000);
}
}

async function handleSpin(){
if(spinning || alreadySpun) return;
spinning = true;
spinBtn.disabled = true;
statusEl.textContent = 'กำลังหมุน...';

const winIndex = Math.floor(Math.random()*N);
const targetMid = winIndex * sliceDeg + sliceDeg/2;

// pointer is at top (0deg). We rotate wheel so that targetMid lands at 0deg (top).
const extraSpins = 6;
// full rotations for effect
const finalRotation = currentRotation + extraSpins*360 + (360 - targetMid) + (Math.random()*sliceDeg*0.6 - sliceDeg*0.3);
currentRotation = finalRotation;
wheelEl.style.transform = `rotate(${finalRotation}deg)`;

await new Promise(r => setTimeout(r, 4300));

const prize = sectors[winIndex].value;

// Save result so a page refresh in this same session shows the same result
// instead of allowing another spin.
sessionStorage.setItem(SPIN_KEY, String(prize));

// Log this spin to the Google Sheet backend via Apps Script.
try {
if (window.google && google.script && google.script.run) {
google.script.run.logSpin(prize);
}
} catch (e) {
console.error('ไม่สามารถบันทึกผลรางวัลได้:', e);
}

spawnConfetti();
prizeText.innerHTML = `${prize}<span>บาท</span>`;
overlay.classList.add('show');
statusEl.textContent = `คุณได้รับส่วนลด ${prize} บาท`;
spinBtn.textContent = 'หมุนไปแล้ว';
alreadySpun = true;
spinning = false;
}

spinBtn.addEventListener('click', handleSpin);
closeCard.addEventListener('click', () => overlay.classList.remove('show'));
</script>

</body>
</html>
